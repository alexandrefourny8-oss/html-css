<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens dinâmicas</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Testando tamanhos de Imagens</p>

  <picture>
    <source media="(max-width: 750px)" srcset="imagens/p.png" type="image/png">
    <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
    <img src="imagens/foto-g.png" alt="Imagem flexivel">
  </picture>

      <h1>Reproduzindo áudios</h1>
      <p>Vamos aprender a reproduzir áudios em HTML5.</p>
      <audio preload="metadata" controls> <!--Loop para repetir -->
        <source src="midia/happy-mistake.mp3" type="audio/mpeg">
        <source src="midia/happy-mistake.ogg" type="audio/ogg"> <!--Outras opções de formato de áudio-->
        <source src="midia/happy-mistake.wav" type="audio/wav"> <!--Outras opções de formato de áudio-->
        <p>Infelizmente seu navegador não é compativel com o formato do áudio cliquie <a href="">aqui para baixar o arquivo</a></p>
      </audio>
</body>
</html>
